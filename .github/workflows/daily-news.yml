name: Daily AI News Update

on:
  schedule:
    # 每天北京时间06:00运行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install openai

      - name: Create archive directories
        run: |
          mkdir -p archives/daily archives/weekly archives/monthly archives/quarterly

      - name: Generate daily news
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-news.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ archives/
          git diff --staged --quiet || git commit -m "🤖 更新AI快讯 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git stash --include-untracked
          git pull --rebase
          git stash pop || true
          git push
