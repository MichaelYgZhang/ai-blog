name: Daily AI Article

on:
  schedule:
    # 每天北京时间08:00运行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create archive directories
        run: mkdir -p archives/articles

      - name: Generate daily article
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ archives/
          git diff --staged --quiet || git commit -m "📖 每日AI学习文章 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git stash --include-untracked
          git pull --rebase
          git stash pop || true
          git push
