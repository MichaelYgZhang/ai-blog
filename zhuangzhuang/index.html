<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>壮壮英语乐园 🌈</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pink:#FF85A2;--pink-light:#FFE0EA;
  --purple:#B39DDB;--purple-light:#EDE7F6;
  --yellow:#FFD93D;--yellow-light:#FFFDE7;
  --green:#6BCB77;--green-light:#E8F5E9;
  --blue:#4D96FF;--blue-light:#E3F2FD;
  --orange:#FFB347;--orange-light:#FFF3E0;
  --bg:#FFF5F8;
  --radius:28px;
  --shadow:0 8px 32px rgba(0,0,0,.10);
}
body{
  font-family:'Comic Sans MS',cursive,sans-serif;
  background:var(--bg);
  min-height:100vh;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
.app-header{
  background:linear-gradient(135deg,#FF85A2 0%,#B39DDB 50%,#4D96FF 100%);
  padding:20px 16px 18px;
  text-align:center;
  position:relative;
  border-radius:0 0 40px 40px;
  box-shadow:0 4px 20px rgba(180,100,150,.25);
}
.app-header h1{
  font-size:clamp(1.6rem,6vw,2.4rem);
  color:#fff;
  font-weight:900;
  text-shadow:0 2px 8px rgba(0,0,0,.15);
  letter-spacing:1px;
}
.app-header p{color:rgba(255,255,255,.88);font-size:.95rem;margin-top:4px;}
.deco{position:absolute;font-size:2rem;top:14px;}
.deco-l{left:14px;}
.deco-r{right:14px;}

/* ===== PROGRESS BANNER ===== */
.progress-banner{
  display:flex;align-items:center;gap:12px;
  background:#fff;
  margin:16px 16px 0;
  padding:14px 18px;
  border-radius:20px;
  box-shadow:var(--shadow);
}
.progress-banner .badge{
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;font-weight:900;
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
  box-shadow:0 3px 10px rgba(255,179,71,.4);
}
.progress-info{flex:1;}
.progress-info .label{font-size:.85rem;color:#aaa;}
.progress-info .learned-text{font-size:1rem;font-weight:700;color:#555;margin:2px 0 6px;}
.bar-wrap{height:10px;background:#F0F0F0;border-radius:10px;overflow:hidden;}
.bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),var(--yellow),var(--pink));
  border-radius:10px;
  transition:width .6s cubic-bezier(.34,1.56,.64,1);
  width:0%;
}
.star-row{font-size:1.1rem;margin-top:6px;min-height:22px;}

/* ===== CATEGORY TABS ===== */
.cat-scroll{
  overflow-x:auto;
  padding:14px 16px 4px;
  display:flex;gap:10px;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn{
  border:none;background:#fff;
  border-radius:50px;padding:9px 18px;
  font-size:.9rem;font-family:inherit;font-weight:700;
  cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,.10);
  transition:all .2s;color:#777;
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.cat-btn:hover{transform:translateY(-2px);}
.cat-btn.active{color:#fff;transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.18);}
.cat-btn[data-cat="animals"].active{background:linear-gradient(135deg,#FF6B6B,#FF8E53);}
.cat-btn[data-cat="fruits"].active{background:linear-gradient(135deg,#6BCB77,#40C9A2);}
.cat-btn[data-cat="colors"].active{background:linear-gradient(135deg,#4D96FF,#845EF7);}
.cat-btn[data-cat="numbers"].active{background:linear-gradient(135deg,#FFD93D,#FF8E53);}
.cat-btn[data-cat="body"].active{background:linear-gradient(135deg,#FF85A2,#B39DDB);}
.cat-btn[data-cat="vehicles"].active{background:linear-gradient(135deg,#FF8E53,#FFD93D);}
.cat-btn[data-cat="greetings"].active{background:linear-gradient(135deg,#B39DDB,#4D96FF);}
.cat-btn[data-cat="family"].active{background:linear-gradient(135deg,#FF85A2,#FF6B6B);}

/* ===== MAIN CARD AREA ===== */
.main-area{
  padding:16px 16px 100px;
  max-width:520px;
  margin:0 auto;
}

/* ===== WORD CARD (big single card) ===== */
.word-display{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:28px 20px 24px;
  text-align:center;
  position:relative;
  margin-bottom:18px;
  transition:transform .2s;
}
.word-display.pop{animation:popCard .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popCard{
  0%{transform:scale(1);}40%{transform:scale(1.04);}100%{transform:scale(1);}
}
.nav-arrows{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}
.nav-btn{
  border:none;background:var(--yellow-light);
  width:44px;height:44px;border-radius:50%;
  font-size:1.4rem;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.nav-btn:hover{background:var(--yellow);transform:scale(1.1);}
.word-counter{
  font-size:.85rem;color:#bbb;font-weight:600;
}
.word-illustration{
  font-size:clamp(6rem,22vw,9rem);
  line-height:1;
  display:block;
  margin:10px auto 18px;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.12));
  cursor:pointer;
  transition:transform .2s;
  user-select:none;
}
.word-illustration:hover{transform:scale(1.06);}
.word-illustration.shake{animation:shake .5s ease;}
@keyframes shake{
  0%,100%{transform:rotate(0);}
  20%{transform:rotate(-8deg) scale(1.08);}
  50%{transform:rotate(8deg) scale(1.08);}
  80%{transform:rotate(-4deg) scale(1.04);}
}
.word-english{
  font-size:clamp(2rem,8vw,3rem);
  font-weight:900;color:#333;
  text-transform:capitalize;
  letter-spacing:1px;
}
.word-phonetic{
  font-size:.9rem;color:#bbb;
  font-style:italic;margin:4px 0 6px;
}
.word-chinese{
  font-size:1.3rem;color:#888;font-weight:700;
}
/* learned badge */
.learned-badge{
  position:absolute;top:14px;right:16px;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;font-size:.75rem;font-weight:900;
  padding:4px 10px;border-radius:50px;
  opacity:0;transform:scale(.7);
  transition:all .3s;
}
.learned-badge.show{opacity:1;transform:scale(1);}

/* ===== SPEAK BUTTON ===== */
.speak-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px;
  border:none;border-radius:20px;
  font-size:1.2rem;font-family:inherit;font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;
  box-shadow:0 6px 20px rgba(179,157,219,.4);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  margin-bottom:12px;
  letter-spacing:.5px;
}
.speak-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 28px rgba(179,157,219,.5);}
.speak-btn:active{transform:scale(.97);}
.speak-btn.playing{
  background:linear-gradient(135deg,var(--green),var(--blue));
  animation:pulse .8s ease infinite alternate;
}
@keyframes pulse{
  from{box-shadow:0 6px 20px rgba(77,150,255,.3);}
  to{box-shadow:0 10px 32px rgba(77,150,255,.55);}
}
.speak-icon{font-size:1.6rem;}
.speak-label{flex:1;}
.speak-hint{font-size:.78rem;opacity:.85;font-weight:400;}

/* ===== MINI BUTTONS ROW ===== */
.mini-btns{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:12px;
}
.mini-btn{
  border:none;padding:13px 10px;
  border-radius:16px;font-family:inherit;font-weight:700;font-size:.9rem;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.mini-btn:hover{transform:translateY(-2px);}
.btn-en{background:var(--blue-light);color:var(--blue);}
.btn-en:hover{background:var(--blue);color:#fff;}
.btn-zh{background:var(--pink-light);color:var(--pink);}
.btn-zh:hover{background:var(--pink);color:#fff;}

/* ===== WORD LIST (thumbnails) ===== */
.word-list-title{
  font-size:1rem;color:#bbb;font-weight:700;
  margin:18px 0 10px;text-align:center;letter-spacing:1px;
}
.word-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
  gap:10px;
}
.wl-item{
  background:#fff;border-radius:16px;padding:10px 6px 8px;
  text-align:center;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  transition:all .2s;
  border:2.5px solid transparent;
}
.wl-item:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.13);}
.wl-item.current{border-color:var(--yellow);background:var(--yellow-light);}
.wl-item.done{border-color:var(--green);}
.wl-emoji{font-size:1.8rem;display:block;line-height:1;}
.wl-en{font-size:.68rem;font-weight:700;color:#555;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-check{font-size:.75rem;color:var(--green);}

/* ===== LOG PANEL ===== */
.log-toggle{
  width:100%;border:none;
  background:var(--purple-light);color:var(--purple);
  padding:13px;border-radius:16px;
  font-family:inherit;font-weight:700;font-size:.92rem;
  cursor:pointer;margin-top:18px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.log-toggle:hover{background:var(--purple);color:#fff;}
.log-panel{
  display:none;background:#fff;border-radius:20px;
  padding:16px;margin-top:10px;
  box-shadow:var(--shadow);
  max-height:400px;overflow-y:auto;
}
.log-panel.open{display:block;}
.log-panel h3{font-size:.95rem;color:#888;margin-bottom:12px;}
.log-date-group{margin-bottom:14px;}
.log-date-label{
  font-size:.78rem;font-weight:900;color:var(--purple);
  background:var(--purple-light);display:inline-block;
  padding:2px 10px;border-radius:20px;margin-bottom:6px;
}
.log-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid #F5F5F5;
}
.log-item:last-child{border:none;}
.log-emoji{font-size:1.5rem;}
.log-text{flex:1;}
.log-en{font-size:.95rem;font-weight:700;color:#444;}
.log-zh{font-size:.78rem;color:#aaa;}
.log-time{font-size:.72rem;color:#ccc;}
.log-empty{text-align:center;color:#ccc;padding:20px 0;font-size:.9rem;}

/* ===== QUIZ MODAL ===== */
.quiz-btn{
  width:100%;border:none;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;padding:14px;
  border-radius:16px;
  font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;margin-top:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(255,179,71,.35);
  transition:all .2s;
}
.quiz-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,179,71,.45);}
.quiz-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:2000;
  align-items:center;justify-content:center;
  padding:16px;
}
.quiz-overlay.open{display:flex;}
.quiz-box{
  background:#fff;border-radius:32px;
  padding:28px 24px;width:100%;max-width:460px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.quiz-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:18px;
}
.quiz-title{font-size:1.1rem;font-weight:900;color:#444;}
.quiz-close{
  border:none;background:none;font-size:1.4rem;cursor:pointer;
  color:#bbb;transition:color .2s;
}
.quiz-close:hover{color:#FF6B6B;}
.quiz-score-bar{
  display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;
}
.quiz-dot{
  width:12px;height:12px;border-radius:50%;
  background:#EEE;transition:background .3s;
}
.quiz-dot.correct{background:var(--green);}
.quiz-dot.wrong{background:#FF6B6B;}
.quiz-question{
  text-align:center;margin-bottom:22px;
}
.quiz-q-emoji{font-size:5rem;display:block;margin-bottom:10px;line-height:1;}
.quiz-q-text{font-size:1rem;color:#888;font-weight:600;}
.quiz-options{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:14px;
}
.quiz-opt{
  border:2.5px solid #EEE;
  background:#FAFAFA;border-radius:16px;
  padding:14px 8px;font-family:inherit;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all .2s;color:#444;text-align:center;
}
.quiz-opt:hover{border-color:var(--yellow);background:var(--yellow-light);}
.quiz-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
.quiz-opt.wrong{border-color:#FF6B6B;background:#FFEBEE;color:#FF6B6B;}
.quiz-opt:disabled{cursor:default;}
.quiz-feedback{
  text-align:center;font-size:1.3rem;font-weight:900;
  min-height:36px;margin-bottom:8px;
}
.quiz-next{
  width:100%;border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;padding:14px;
  border-radius:16px;font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;transition:all .2s;
  display:none;
}
.quiz-next.show{display:block;}
.quiz-next:hover{transform:translateY(-2px);}
.quiz-result{
  text-align:center;
  display:none;
}
.quiz-result.show{display:block;}
.quiz-result-emoji{font-size:4rem;display:block;}
.quiz-result-text{font-size:1.2rem;font-weight:900;color:#444;margin:10px 0 4px;}
.quiz-result-sub{font-size:.9rem;color:#aaa;}
.quiz-restart{
  margin-top:16px;border:none;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;padding:14px 32px;
  border-radius:50px;font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;box-shadow:0 4px 16px rgba(255,179,71,.35);
  transition:transform .2s;
}
.quiz-restart:hover{transform:scale(1.05);}

/* ===== CONFETTI ===== */
.confetti-piece{
  position:fixed;pointer-events:none;z-index:9999;
  width:10px;height:10px;border-radius:3px;
  animation:confettiFall 1.8s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translateY(120vh) rotate(720deg) scale(.5);opacity:0;}
}
.fly-star{
  position:fixed;pointer-events:none;z-index:9999;
  font-size:1.6rem;
  animation:flyUp 1.2s ease-out forwards;
}
@keyframes flyUp{
  0%{transform:translateY(0) scale(.5);opacity:1;}
  100%{transform:translateY(-140px) scale(1.2);opacity:0;}
}

/* ===== PLAYING INDICATOR ===== */
.playing-indicator{
  display:none;
  align-items:center;justify-content:center;gap:6px;
  font-size:.85rem;color:var(--blue);font-weight:700;
  margin-top:8px;
}
.playing-indicator.show{display:flex;}
.wave{display:flex;align-items:flex-end;gap:3px;}
.wave-bar{
  width:4px;background:var(--blue);border-radius:4px;
  animation:wave .8s ease-in-out infinite alternate;
}
.wave-bar:nth-child(2){animation-delay:.15s;}
.wave-bar:nth-child(3){animation-delay:.3s;}
.wave-bar:nth-child(4){animation-delay:.15s;}
@keyframes wave{
  from{height:4px;}to{height:18px;}
}

@media(max-width:400px){
  .mini-btns{grid-template-columns:1fr;}
  .word-list{grid-template-columns:repeat(4,1fr);}
}

/* ===== REVIEW BANNER ===== */
.review-banner{
  margin:12px 16px 0;
  background:linear-gradient(135deg,#fff8e1,#fff3cd);
  border:2px solid var(--yellow);
  border-radius:20px;padding:14px 18px;
  display:none;cursor:pointer;
  box-shadow:0 4px 16px rgba(255,193,7,.2);
  transition:transform .2s;
}
.review-banner:hover{transform:translateY(-2px);}
.review-banner.show{display:flex;align-items:center;gap:14px;}
.review-banner-icon{font-size:2.2rem;flex-shrink:0;}
.review-banner-text{flex:1;}
.review-banner-title{font-size:1rem;font-weight:900;color:#f57f17;}
.review-banner-sub{font-size:.82rem;color:#888;margin-top:2px;}
.review-banner-count{
  background:var(--yellow);color:#fff;
  font-size:.9rem;font-weight:900;
  padding:4px 12px;border-radius:50px;
  flex-shrink:0;
}

/* ===== MATCH GAME BUTTON ===== */
.match-btn{
  width:100%;border:none;
  background:linear-gradient(135deg,#4D96FF,#845EF7);
  color:#fff;padding:14px;
  border-radius:16px;
  font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(77,150,255,.35);
  transition:all .2s;
}
.match-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(77,150,255,.45);}

/* ===== LISTEN QUIZ BUTTON ===== */
.listen-btn{
  width:100%;border:none;
  background:linear-gradient(135deg,#6BCB77,#40C9A2);
  color:#fff;padding:14px;
  border-radius:16px;
  font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(107,203,119,.35);
  transition:all .2s;
}
.listen-btn:hover{transform:translateY(-2px);}

/* ===== MATCH GAME MODAL ===== */
.match-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:3000;
  align-items:flex-start;justify-content:center;
  padding:16px;overflow-y:auto;
}
.match-overlay.open{display:flex;}
.match-box{
  background:#fff;border-radius:32px;
  padding:24px 20px;width:100%;max-width:480px;
  margin:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
.match-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
}
.match-title{font-size:1.1rem;font-weight:900;color:#444;}
.match-close{border:none;background:none;font-size:1.4rem;cursor:pointer;color:#bbb;}
.match-close:hover{color:#FF6B6B;}
.match-desc{font-size:.85rem;color:#aaa;margin-bottom:16px;}
.match-area{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.match-col{display:flex;flex-direction:column;gap:10px;}
.match-col-title{
  font-size:.8rem;font-weight:900;color:#bbb;
  text-align:center;letter-spacing:1px;margin-bottom:4px;
}
.match-card{
  border:2.5px solid #EEE;
  background:#FAFAFA;border-radius:16px;
  padding:14px 8px;font-family:inherit;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all .2s;color:#444;text-align:center;
  min-height:60px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;
  user-select:none;
}
.match-card:hover{transform:scale(1.03);}
.match-card.selected{border-color:#4D96FF;background:#E3F2FD;}
.match-card.matched{border-color:var(--green);background:var(--green-light);color:var(--green);pointer-events:none;opacity:.7;}
.match-card.wrong-flash{animation:wrongFlash .35s ease;}
@keyframes wrongFlash{
  0%,100%{border-color:#EEE;background:#FAFAFA;}
  50%{border-color:#FF6B6B;background:#FFEBEE;}
}
.match-card .mc-emoji{font-size:1.8rem;line-height:1;}
.match-progress{
  margin-top:16px;text-align:center;
  font-size:.9rem;color:#aaa;font-weight:700;
}
.match-result{
  display:none;text-align:center;padding:20px 0 8px;
}
.match-result.show{display:block;}
.match-result-emoji{font-size:3.5rem;display:block;margin-bottom:8px;}
.match-result-text{font-size:1.2rem;font-weight:900;color:#444;}
.match-restart{
  margin-top:14px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;padding:13px 32px;
  border-radius:50px;font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;transition:transform .2s;
}
.match-restart:hover{transform:scale(1.05);}

/* ===== LISTEN QUIZ MODAL ===== */
.listen-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:3000;
  align-items:center;justify-content:center;
  padding:16px;
}
.listen-overlay.open{display:flex;}

// Helper: render word illustration (emoji / iconify img / txt placeholder)
// Helper: emoji → Noto animated GIF URL
// Noto Animated Emoji: https://googlefonts.github.io/noto-emoji-animation/
const NOTO_BASE = 'https://fonts.gstatic.com/s/e/notoemoji/latest/';
function notoUrl(emoji){
  // Get primary codepoint (skip variation selectors & ZWJ)
  const skip = new Set([0xfe0f, 0x200d]);
  const cps = [...emoji]
    .map(c => c.codePointAt(0))
    .filter(cp => cp > 127 && !skip.has(cp));
  if(!cps.length) return null;
  return NOTO_BASE + cps[0].toString(16) + '/512.gif';
}

function renderIllustration(w, container, size='large'){
  if(w.img){
    // iconify CDN image (工程车等专用图标)
    const imgSize = size==='large' ? 'clamp(6rem,22vw,9rem)' : '1.8rem';
    container.innerHTML = `<img src="${w.img}" alt="${w.z}" style="width:${imgSize};height:${imgSize};object-fit:contain;display:block;${size==='large'?'margin:0 auto':''}" onerror="this.replaceWith(document.createTextNode('${w.i}'))">`;
  } else if(w.txt){
    // Chinese text placeholder
    const fs = size==='large' ? 'clamp(4rem,16vw,7rem)' : '1.4rem';
    container.innerHTML = `<span style="font-size:${fs};font-weight:900;color:#e67e22;line-height:1;display:block;${size==='large'?'text-align:center;margin:10px auto':''};font-family:sans-serif">${w.txt}</span>`;
  } else if(size==='large'){
    // 大卡片：尝试 Noto 动态 GIF，失败降级到 emoji 文字
    const gifUrl = notoUrl(w.i);
    if(gifUrl){
      const imgSize = 'clamp(6rem,22vw,9rem)';
      container.innerHTML = `<img src="${gifUrl}" alt="${w.i}" style="width:${imgSize};height:${imgSize};object-fit:contain;display:block;margin:0 auto" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${w.i}'}))">`;
    } else {
      container.textContent = w.i;
    }
  } else {
    // 小图（词汇列表）：直接用 emoji 文字，不用动画（加载太多GIF慢）
    container.textContent = w.i;
  }
}

// ══════════════════════════════════════════
//  SPEECH
// ══════════════════════════════════════════
function getEnVoice(){
  const vs = speechSynthesis.getVoices();
  // 优先选 en-US 女声，其次 en-US，再次任意英语声音
  return vs.find(v=>v.lang==='en-US'&&/female/i.test(v.name))
      || vs.find(v=>v.lang==='en-US')
      || vs.find(v=>v.lang.startsWith('en-US'))
      || vs.find(v=>v.lang.startsWith('en'))
      || null;
}
function getZhVoice(){
  const vs = speechSynthesis.getVoices();
  // 优先标准普通话: zh-CN，名字含 Mandarin/普通话/Ting-Ting/XiaoXiao/Li-Na
  return vs.find(v=>v.lang==='zh-CN'&&/mandarin|pu通|tingting|xiaoxiao|li.na|yunxi|yunyang/i.test(v.name))
      || vs.find(v=>v.lang==='zh-CN')
      || vs.find(v=>v.lang==='zh_CN')
      || vs.find(v=>v.lang.startsWith('zh-CN'))
      || vs.find(v=>v.lang.startsWith('zh'))
      || null;
}

function speakText(text, lang, rate=0.85, pitch=1.1){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return;}
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    utter.rate = rate;
    utter.pitch = pitch;
    // 指定声音：英文用 en-US，中文用 zh-CN 普通话
    if(lang.startsWith('en')){
      const v=getEnVoice(); if(v) utter.voice=v;
      utter.lang='en-US';
    } else {
      const v=getZhVoice(); if(v) utter.voice=v;
      utter.lang='zh-CN';
    }
    utter.onend = resolve;
    utter.onerror = resolve;
    speechSynthesis.speak(utter);
    // fallback timeout
    const fallback = setTimeout(resolve, text.length*200+1500);
    utter.onend = ()=>{clearTimeout(fallback);resolve();};
  });
}

async function speakBoth(word){
  if(isSpeaking) return;
  isSpeaking=true;
  setPlaying(true,'英语…');
  await speakText(word.e,'en-US',0.82,1.1);
  setPlaying(true,'中文…');
  await new Promise(r=>setTimeout(r,300));
  await speakText(word.z,'zh-CN',0.88,1.0);
  setPlaying(false,'');
  isSpeaking=false;
  markLearned(word);
}

async function speakEn(word){
  if(isSpeaking) return;
  isSpeaking=true;
  setPlaying(true,'英语…');
  await speakText(word.e,'en-US',0.82,1.1);
  setPlaying(false,'');
  isSpeaking=false;
  markLearned(word);
}

async function speakZh(word){
  if(isSpeaking) return;
  isSpeaking=true;
  setPlaying(true,'中文…');
  await speakText(word.z,'zh-CN',0.88,1.0);
  setPlaying(false,'');
  isSpeaking=false;
}

function setPlaying(on, label){
  const ind = document.getElementById('playingIndicator');
  const btn = document.getElementById('mainSpeakBtn');
  const lbl = document.getElementById('playingLabel');
  if(on){
    ind.classList.add('show');
    btn.classList.add('playing');
    lbl.textContent = label;
  } else {
    ind.classList.remove('show');
    btn.classList.remove('playing');
  }
}

//  LEARNED / LOG
// ══════════════════════════════════════════
function markLearned(word){
  const already = log.some(l=>l.en===word.e);
  if(!already){
    log.unshift({en:word.e, zh:word.z, emoji:word.i,
      time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
      date:todayStr()
    });
    saveLog(log);
    triggerConfetti();
  }
  // 遗忘曲线：记录学习时间
  markWordLearned(word.e);
  updateBadge(word);
  renderProgress();
  renderLog();
  renderWordList();

  // 每点击5次，自动随机跳到下一个单词
  clickCount++;
  if(clickCount >= 5){
    clickCount = 0;
    const words = CATEGORIES[currentCat].words;
    let nextIdx;
    do { nextIdx = Math.floor(Math.random() * words.length); }
    while (words.length > 1 && nextIdx === currentIdx);
    currentIdx = nextIdx;
    setTimeout(()=>{
      renderCard();
      renderWordList();
      const ill = document.getElementById('wordIllustration');
      ill.classList.remove('shake');
      void ill.offsetWidth;
      ill.classList.add('shake');
      // 自动跳词后也播放
      setTimeout(()=>{ if(!isAnyModalOpen()) speakBoth(currentWord()); }, 300);
    }, 800);
  }
}

function isLearned(wordEn){
  return log.some(l=>l.en===wordEn);
}

function currentWord(){

//  RENDER WORD LIST
// ══════════════════════════════════════════
function renderWordList(){
  const words = CATEGORIES[currentCat].words;
  const container = document.getElementById('wordList');
  container.innerHTML='';
  words.forEach((w,i)=>{
    const div=document.createElement('div');
    div.className='wl-item'+(i===currentIdx?' current':'')+(isLearned(w.e)?' done':'');
    // build emoji/img/txt for small list item
    const emojiSpan = document.createElement('span');
    emojiSpan.className = 'wl-emoji';
    renderIllustration(w, emojiSpan, 'small');
    div.appendChild(emojiSpan);
    const enDiv = document.createElement('div');
    enDiv.className = 'wl-en';
    enDiv.textContent = w.e;
    div.appendChild(enDiv);
    if(isLearned(w.e)){
      const ck = document.createElement('div');
      ck.className = 'wl-check';
      ck.textContent = '✅';
      div.appendChild(ck);
    }
    div.addEventListener('click',()=>{
      if(isAnyModalOpen()) return;
      currentIdx=i;
      renderCard();
      renderWordList();
      setTimeout(()=>{ if(!isAnyModalOpen()) speakBoth(CATEGORIES[currentCat].words[i]); }, 200);
    });
    container.appendChild(div);
  });
}

function renderProgress(){
  const total = Object.values(CATEGORIES).reduce((s,c)=>s+c.words.length,0);
  const n = log.length;
  document.getElementById('totalBadge').textContent = n;
  document.getElementById('learnedText').textContent =
    n===0 ? '还没有开始，加油哦！' : `已学会 ${n} / ${total} 个单词！`;
  const pct = Math.min(100, Math.round(n/total*100));
  document.getElementById('barFill').style.width = pct+'%';
  const stars = '⭐'.repeat(Math.floor(n/3));
  document.getElementById('starRow').textContent = stars;
  document.getElementById('logCount').textContent = `(${n})`;
}

// ══════════════════════════════════════════
//  RENDER LOG (grouped by date)
// ══════════════════════════════════════════
function renderLog(){
  const el = document.getElementById('logContent');
  if(!log.length){
    el.innerHTML='<div class="log-empty">还没有学过单词哦，快开始吧！🌱</div>';
    return;
  }
  // group by date
  const groups = {};
  log.forEach(l=>{
    const d = l.date || '历史记录';
    if(!groups[d]) groups[d]=[];
    groups[d].push(l);
  });
  const sortedDates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML = sortedDates.map(date=>{
    const today = todayStr();
    const label = date===today ? '📅 今天' : date===getPrevDay(today) ? '📅 昨天' : `📅 ${date}`;
    const items = groups[date].map(l=>`
      <div class="log-item">
        <span class="log-emoji">${l.emoji}</span>
        <div class="log-text">
          <div class="log-en">${l.en}</div>
          <div class="log-zh">${l.zh}</div>
        </div>
        <div class="log-time">${l.time||''}</div>
      </div>
    `).join('');
    return `<div class="log-date-group"><div class="log-date-label">${label}（${groups[date].length} 词）</div>${items}</div>`;
  }).join('');
}

function getPrevDay(dateStr){
  const d = new Date(dateStr);
  d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))+'-'+(String(d.getDate()).padStart(2,'0'));
}

//  CONFETTI
// ══════════════════════════════════════════
function triggerConfetti(){
  const colors=['#FF85A2','#FFD93D','#6BCB77','#4D96FF','#B39DDB','#FF6B6B'];
  for(let i=0;i<22;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`
        left:${Math.random()*100}vw;
        top:-20px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'3px'};
        width:${8+Math.random()*8}px;
        height:${8+Math.random()*8}px;
        animation-duration:${1.2+Math.random()*.8}s;
        animation-delay:${Math.random()*.3}s;
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2500);
    },i*60);
  }
  // flying stars from card
  const rect = document.getElementById('wordDisplay').getBoundingClientRect();
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='fly-star';
      el.textContent=['⭐','🌟','✨','💫'][Math.floor(Math.random()*4)];
      el.style.left=(rect.left+rect.width/2-14+(Math.random()-0.5)*80)+'px';
      el.style.top=(rect.bottom-30)+'px';
      document.body.appendChild(el);

    },i*150);

// ══════════════════════════════════════════
//  REVIEW REMINDER (艾宾浩斯遗忘曲线)
// ══════════════════════════════════════════
// 复习间隔：1天、3天、7天、14天、30天
const REVIEW_INTERVALS = [1, 3, 7, 14, 30];
const REVIEW_LOG_KEY = 'babyReviewLog_v1'; // {wordEn: [learnedTs, lastReviewTs, reviewCount]}

function loadReviewLog(){ try{return JSON.parse(localStorage.getItem(REVIEW_LOG_KEY)||'{}');}catch(e){return{};} }
function saveReviewLog(d){ localStorage.setItem(REVIEW_LOG_KEY, JSON.stringify(d)); }

function markWordLearned(wordEn){
  const d = loadReviewLog();
  if(!d[wordEn]){
    d[wordEn] = {learnedAt: Date.now(), lastReview: Date.now(), count: 0};
    saveReviewLog(d);
  }
}

function markWordReviewed(wordEn){
  const d = loadReviewLog();
  if(d[wordEn]){
    d[wordEn].lastReview = Date.now();
    d[wordEn].count = (d[wordEn].count||0) + 1;
    saveReviewLog(d);
  }
}

function getDueReviewWords(){
  const d = loadReviewLog();
  const now = Date.now();
  const DAY = 86400000;
  const all = getAllWords();
  return all.filter(w => {
    const rec = d[w.e];
    if(!rec) return false;
    const count = rec.count || 0;
    const interval = REVIEW_INTERVALS[Math.min(count, REVIEW_INTERVALS.length-1)];
    const due = rec.lastReview + interval * DAY;
    return now >= due;
  });
}

function renderReviewBanner(){
  const due = getDueReviewWords();
  const banner = document.getElementById('reviewBanner');
  if(due.length > 0){
    banner.classList.add('show');
    document.getElementById('reviewCount').textContent = due.length + ' 词';
    document.getElementById('reviewBannerSub').textContent =
      due.slice(0,3).map(w=>w.e).join('、') + (due.length>3 ? '…' : '') + ' 等着你复习';
  } else {
    banner.classList.remove('show');
  }
}

document.getElementById('reviewBanner').addEventListener('click',()=>{
  // 跳到第一个需复习的词
  const due = getDueReviewWords();
  if(!due.length) return;
  const w = due[0];
  // 找到该词所在分类
  for(const [cat, data] of Object.entries(CATEGORIES)){
    const idx = data.words.findIndex(x=>x.e===w.e);
    if(idx>=0){
      currentCat = cat;
      currentIdx = idx;
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
      renderCard();
      renderWordList();
      setTimeout(()=>{ if(!isAnyModalOpen()) speakBoth(currentWord()); }, 300);
      // 标记已复习
      due.forEach(dw => markWordReviewed(dw.e));
      renderReviewBanner();
      // 滚动到顶部
      window.scrollTo({top:0, behavior:'smooth'});
      return;
    }
  }
});

// ══════════════════════════════════════════
//  MATCH GAME（配对消消乐）
// ══════════════════════════════════════════
let matchSelected = null; // {type:'emoji'|'word', idx, el}
let matchPairs = [];
let matchMatched = 0;

function buildMatchPairs(){
  const all = getAllWords();
  return [...all].sort(()=>Math.random()-.5).slice(0,8);
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function startMatch(){
  speechSynthesis.cancel();
  isSpeaking=false;
  setPlaying(false,'');
  matchPairs = buildMatchPairs();
  matchSelected = null;
  matchMatched = 0;
  document.getElementById('matchResult').classList.remove('show');
  document.getElementById('matchProgress').textContent = `已配对 0 / ${matchPairs.length}`;

  const emojiCol = document.getElementById('matchEmojis');
  const wordCol  = document.getElementById('matchWords');
  emojiCol.innerHTML = '';
  wordCol.innerHTML = '';

  const shuffledEmoji = shuffle(matchPairs);
  const shuffledWord  = shuffle(matchPairs);

  shuffledEmoji.forEach((w,i)=>{
    const card = document.createElement('div');
    card.className = 'match-card';
    card.dataset.key = w.e;
    card.dataset.type = 'emoji';
    // render illustration inline
    const iconEl = document.createElement('span');
    iconEl.className = 'mc-emoji';
    renderIllustration(w, iconEl, 'small');
    card.appendChild(iconEl);
    card.addEventListener('click',()=>handleMatchClick(card));
    emojiCol.appendChild(card);
  });

  shuffledWord.forEach((w,i)=>{
    const card = document.createElement('div');
    card.className = 'match-card';
    card.dataset.key = w.e;
    card.dataset.type = 'word';
    card.textContent = w.e;
    card.title = w.z;
    card.addEventListener('click',()=>handleMatchClick(card));
    wordCol.appendChild(card);
  });

  document.getElementById('matchOverlay').classList.add('open');
}

function handleMatchClick(card){
  if(card.classList.contains('matched')) return;
  if(matchSelected && matchSelected.el === card) return;

  card.classList.add('selected');

  if(!matchSelected){
    matchSelected = {key: card.dataset.key, type: card.dataset.type, el: card};
    return;
  }

  // second click
  const first = matchSelected;
  matchSelected = null;

  if(first.key === card.dataset.key && first.type !== card.dataset.type){
    // ✅ match!
    first.el.classList.remove('selected');
    card.classList.remove('selected');
    first.el.classList.add('matched');
    card.classList.add('matched');
    matchMatched++;
    triggerConfetti();
    // speak the word
    const w = matchPairs.find(x=>x.e===first.key);
    if(w) speakBoth(w);
    document.getElementById('matchProgress').textContent = `已配对 ${matchMatched} / ${matchPairs.length}`;
    if(matchMatched >= matchPairs.length){
      setTimeout(()=> document.getElementById('matchResult').classList.add('show'), 800);
    }
  } else {
    // ❌ wrong
    first.el.classList.remove('selected');
    card.classList.remove('selected');
    first.el.classList.add('wrong-flash');
    card.classList.add('wrong-flash');
    setTimeout(()=>{
      first.el.classList.remove('wrong-flash');
      card.classList.remove('wrong-flash');
    }, 400);
  }
}

const LISTEN_TOTAL = 10;

function startListenQuiz(){
  speechSynthesis.cancel();
  isSpeaking=false;
  setPlaying(false,'');

  document.getElementById('listenOptions').style.display='';

}

function renderListenScoreBar(){
  const bar = document.getElementById('listenScoreBar');
  bar.innerHTML = Array.from({length:LISTEN_TOTAL},(_,i)=>
    `<div class="quiz-dot" id="ldot${i}"></div>`
  ).join('');
}

function renderListenQuestion(){
  if(listenIdx >= listenPool.length){ showListenResult(); return; }
  listenAnswered = false;
  const w = listenPool[listenIdx];

  // reset play button
  const playBtn = document.getElementById('listenPlayBtn');
  playBtn.classList.remove('playing');
  playBtn.innerHTML = '🔊';
  playBtn.onclick = ()=>{
    playBtn.classList.add('playing');
    speakText(w.e,'en-US',0.75,1.1).then(()=>playBtn.classList.remove('playing'));
  };

  document.getElementById('listenFeedback').textContent = '';
  document.getElementById('listenNext').classList.remove('show');

  // 4 options: images/emojis (not text)
  const all = getAllWords();
  const others = all.filter(x=>x.e!==w.e).sort(()=>Math.random()-.5).slice(0,3);
  const opts = shuffle([...others, w]);

  const container = document.getElementById('listenOptions');
  container.innerHTML = '';
  opts.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'listen-opt';
    // render illustration
    const iconEl = document.createElement('div');
    iconEl.style.cssText = 'font-size:2rem;line-height:1;';
    renderIllustration(opt, iconEl, 'small');
    btn.appendChild(iconEl);
    const lbl = document.createElement('div');
    lbl.className = 'lo-label';
    lbl.textContent = opt.z;
    btn.appendChild(lbl);
    btn.addEventListener('click',()=>handleListenAnswer(opt.e===w.e, btn, w));
    container.appendChild(btn);
  });

  // auto play once
  setTimeout(()=>playBtn.click(), 400);
}

function handleListenAnswer(isCorrect, clickedBtn, correctWord){
  if(listenAnswered) return;
  listenAnswered = true;

  document.querySelectorAll('.listen-opt').forEach(b=>{ b.disabled=true; });
  clickedBtn.classList.add(isCorrect ? 'correct' : 'wrong');
  // mark correct one too
  document.querySelectorAll('.listen-opt').forEach(b=>{
    const lbl = b.querySelector('.lo-label');
    if(lbl && lbl.textContent === correctWord.z) b.classList.add('correct');
  });

  const fb = document.getElementById('listenFeedback');
  const praise = randomPraise(isCorrect);
  if(isCorrect){
    listenScore++;
    fb.textContent = praise.icon + ' ' + praise.en + '！' + praise.zh;
    fb.style.color = 'var(--green)';
    speakText(praise.en, 'en-US', 0.9, 1.2);
  } else {
    fb.textContent = praise.icon + ' ' + praise.en + ' ' + praise.zh + '  正确答案：' + correctWord.e;
    fb.style.color = '#FF6B6B';
    speakText(praise.en, 'en-US', 0.9, 1.1);
  }
  const dot = document.getElementById('ldot'+listenIdx);
  if(dot) dot.className = 'quiz-dot ' + (isCorrect?'correct':'wrong');
  listenIdx++;
  const nxt = document.getElementById('listenNext');
  nxt.classList.add('show');
  nxt.textContent = listenIdx>=listenPool.length ? '查看结果 🎊' : '下一题 ▶';
}

function showListenResult(){
  document.getElementById('listenQArea').style.display='none';
  document.getElementById('listenOptions').style.display='none';
  document.getElementById('listenFeedback').style.display='none';
  document.getElementById('listenNext').classList.remove('show');
  const res = document.getElementById('listenResult');
  res.classList.add('show');
  const pct = Math.round(listenScore/LISTEN_TOTAL*100);
  let emoji='🌟', text='';
  if(pct>=90){emoji='🏆';text='完美！耳朵超级好！';}
  else if(pct>=70){emoji='🎉';text='很棒！多听多练！';}
  else if(pct>=50){emoji='😊';text='不错哦，继续加油！';}
  else{emoji='💪';text='多多听单词，你会越来越棒！';}
  document.getElementById('listenResultEmoji').textContent = emoji;
  document.getElementById('listenResultText').textContent = text;
  document.getElementById('listenResultSub').textContent = `答对 ${listenScore} / ${LISTEN_TOTAL} 题（${pct}%）`;
}

function resetListenDisplay(){
  document.getElementById('listenQArea').style.display='';
  document.getElementById('listenOptions').style.display='';
  document.getElementById('listenFeedback').style.display='';
  document.getElementById('listenResult').classList.remove('show');
}

// ══════════════════════════════════════════
//  PRAISE PHRASES
// ══════════════════════════════════════════
const PRAISE_CORRECT = [
  {en:'Excellent',  zh:'太棒了',   icon:'🏆'},
  {en:'Amazing',    zh:'好厉害',   icon:'🌟'},
  {en:'Perfect',    zh:'完美',     icon:'💯'},
  {en:'Wonderful',  zh:'真厉害',   icon:'🎉'},
  {en:'Super',      zh:'超级棒',   icon:'🦸'},
  {en:'Brilliant',  zh:'聪明极了', icon:'✨'},
  {en:'Awesome',    zh:'好棒棒',   icon:'🥳'},
];
const PRAISE_WRONG = [
  {en:'Try again',  zh:'再试试',   icon:'💪'},
  {en:'Keep going', zh:'继续加油', icon:'🔥'},
  {en:'You can do it', zh:'你可以的', icon:'🌈'},
  {en:'Almost',     zh:'差一点点', icon:'😊'},
  {en:'Come on',    zh:'加油加油', icon:'⭐'},
];
function randomPraise(isCorrect){
  const arr = isCorrect ? PRAISE_CORRECT : PRAISE_WRONG;
  return arr[Math.floor(Math.random()*arr.length)];
}

// ══════════════════════════════════════════
//  QUIZ MODULE
// ══════════════════════════════════════════
const QUIZ_TOTAL = 10;
let quizPool = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;

function getAllWords(){
  return Object.values(CATEGORIES).flatMap(c=>c.words);
}

function buildQuizPool(){
  // prefer learned words, pad with random if < QUIZ_TOTAL
  const all = getAllWords();
  const learned = all.filter(w=>isLearned(w.e));
  let pool = learned.length >= QUIZ_TOTAL
    ? [...learned].sort(()=>Math.random()-.5).slice(0,QUIZ_TOTAL)
    : [...all].sort(()=>Math.random()-.5).slice(0,QUIZ_TOTAL);
  return pool;
}

function buildOptions(correct){
  const all = getAllWords();
  const others = all.filter(w=>w.e!==correct.e).sort(()=>Math.random()-.5).slice(0,3);
  return [...others, correct].sort(()=>Math.random()-.5);
}

function startQuiz(){
  speechSynthesis.cancel();
  isSpeaking=false;
  setPlaying(false,'');
  quizPool = buildQuizPool();
  quizIdx = 0;
  quizScore = 0;
  quizAnswered = false;
  document.getElementById('quizOverlay').classList.add('open');
  document.getElementById('quizResult').classList.remove('show');
  renderQuizQuestion();
  renderQuizScoreBar();
}

function renderQuizScoreBar(){
  const bar = document.getElementById('quizScoreBar');
  bar.innerHTML = Array.from({length:QUIZ_TOTAL},(_,i)=>{
    let cls='quiz-dot';
    if(i<quizIdx) cls+=' correct'; // simplified; updated in real-time
    return `<div class="${cls}" id="qdot${i}"></div>`;
  }).join('');
}

function updateScoreDot(idx, correct){
  const dot = document.getElementById('qdot'+idx);
  if(dot) dot.className = 'quiz-dot ' + (correct?'correct':'wrong');
}

function renderQuizQuestion(){
  if(quizIdx >= quizPool.length){ showQuizResult(); return; }
  quizAnswered = false;
  const w = quizPool[quizIdx];
  renderIllustration(w, document.getElementById('quizEmoji'), 'large');
  document.getElementById('quizQText').textContent = '这个英文单词是？（看图选答案）';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizNext').classList.remove('show');

  // speak the word
  speakText(w.e,'en-US',0.82,1.1);

  const opts = buildOptions(w);
  const container = document.getElementById('quizOptions');
  container.innerHTML='';
  opts.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='quiz-opt';
    btn.textContent = opt.e + '\n' + opt.z;
    btn.style.whiteSpace='pre-line';
    btn.addEventListener('click',()=>handleQuizAnswer(opt.e===w.e, btn, opts, w));
    container.appendChild(btn);
  });
}

function handleQuizAnswer(isCorrect, clickedBtn, opts, correctWord){
  if(quizAnswered) return;
  quizAnswered = true;

  // mark buttons
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent.startsWith(correctWord.e)) b.classList.add('correct');
  });
  if(!isCorrect) clickedBtn.classList.add('wrong');

  const praise = randomPraise(isCorrect);
  if(isCorrect){
    quizScore++;
    document.getElementById('quizFeedback').textContent = praise.icon + ' ' + praise.en + '！' + praise.zh;
    document.getElementById('quizFeedback').style.color='var(--green)';
    speakText(praise.en, 'en-US', 0.9, 1.2);
  } else {
    document.getElementById('quizFeedback').textContent = praise.icon + ' ' + praise.en + ' ' + praise.zh + '  正确答案：' + correctWord.e;
    document.getElementById('quizFeedback').style.color='#FF6B6B';
    speakText(praise.en, 'en-US', 0.9, 1.1);
  }
  updateScoreDot(quizIdx, isCorrect);
  quizIdx++;
  document.getElementById('quizNext').classList.add('show');
  if(quizIdx>=quizPool.length){
    document.getElementById('quizNext').textContent='查看结果 🎊';
  } else {
    document.getElementById('quizNext').textContent='下一题 ▶';
  }
}

function showQuizResult(){
  document.getElementById('quizQuestion').style.display='none';
  document.getElementById('quizOptions').style.display='none';
  document.getElementById('quizFeedback').style.display='none';
  document.getElementById('quizNext').classList.remove('show');
  const res = document.getElementById('quizResult');
  res.classList.add('show');
  const pct = Math.round(quizScore/QUIZ_TOTAL*100);
  let emoji='🌟', text='';
  if(pct>=90){emoji='🏆';text='完美！壮壮太厉害了！';}
  else if(pct>=70){emoji='🎉';text='很棒！继续加油！';}
  else if(pct>=50){emoji='😊';text='不错哦，再练练！';}
  else{emoji='💪';text='多多练习，你一定可以！';}
  document.getElementById('quizResultEmoji').textContent=emoji;
  document.getElementById('quizResultText').textContent=text;
  document.getElementById('quizResultSub').textContent=`答对 ${quizScore} / ${QUIZ_TOTAL} 题（${pct}%）`;
}

function resetQuizDisplay(){
  document.getElementById('quizQuestion').style.display='';
  document.getElementById('quizOptions').style.display='';
  document.getElementById('quizFeedback').style.display='';
  document.getElementById('quizResult').classList.remove('show');
}
