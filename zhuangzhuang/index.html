<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>壮壮英语乐园 🌈</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pink:#FF85A2;--pink-light:#FFE0EA;
  --purple:#B39DDB;--purple-light:#EDE7F6;
  --yellow:#FFD93D;--yellow-light:#FFFDE7;
  --green:#6BCB77;--green-light:#E8F5E9;
  --blue:#4D96FF;--blue-light:#E3F2FD;
  --orange:#FFB347;--orange-light:#FFF3E0;
  --bg:#FFF5F8;
  --radius:28px;
  --shadow:0 8px 32px rgba(0,0,0,.10);
}
body{
  font-family:'Comic Sans MS',cursive,sans-serif;
  background:var(--bg);
  min-height:100vh;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
.app-header{
  background:linear-gradient(135deg,#FF85A2 0%,#B39DDB 50%,#4D96FF 100%);
  padding:20px 16px 18px;
  text-align:center;
  position:relative;
  border-radius:0 0 40px 40px;
  box-shadow:0 4px 20px rgba(180,100,150,.25);
}
.app-header h1{
  font-size:clamp(1.6rem,6vw,2.4rem);
  color:#fff;
  font-weight:900;
  text-shadow:0 2px 8px rgba(0,0,0,.15);
  letter-spacing:1px;
}
.app-header p{color:rgba(255,255,255,.88);font-size:.95rem;margin-top:4px;}
.deco{position:absolute;font-size:2rem;top:14px;}
.deco-l{left:14px;}
.deco-r{right:14px;}

/* ===== PROGRESS BANNER ===== */
.progress-banner{
  display:flex;align-items:center;gap:12px;
  background:#fff;
  margin:16px 16px 0;
  padding:14px 18px;
  border-radius:20px;
  box-shadow:var(--shadow);
}
.progress-banner .badge{
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;font-weight:900;
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
  box-shadow:0 3px 10px rgba(255,179,71,.4);
}
.progress-info{flex:1;}
.progress-info .label{font-size:.85rem;color:#aaa;}
.progress-info .learned-text{font-size:1rem;font-weight:700;color:#555;margin:2px 0 6px;}
.bar-wrap{height:10px;background:#F0F0F0;border-radius:10px;overflow:hidden;}
.bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),var(--yellow),var(--pink));
  border-radius:10px;
  transition:width .6s cubic-bezier(.34,1.56,.64,1);
  width:0%;
}
.star-row{font-size:1.1rem;margin-top:6px;min-height:22px;}

/* ===== CATEGORY TABS ===== */
.cat-scroll{
  overflow-x:auto;
  padding:14px 16px 4px;
  display:flex;gap:10px;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn{
  border:none;background:#fff;
  border-radius:50px;padding:9px 18px;
  font-size:.9rem;font-family:inherit;font-weight:700;
  cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,.10);
  transition:all .2s;color:#777;
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.cat-btn:hover{transform:translateY(-2px);}
.cat-btn.active{color:#fff;transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.18);}
.cat-btn[data-cat="animals"].active{background:linear-gradient(135deg,#FF6B6B,#FF8E53);}
.cat-btn[data-cat="fruits"].active{background:linear-gradient(135deg,#6BCB77,#40C9A2);}
.cat-btn[data-cat="colors"].active{background:linear-gradient(135deg,#4D96FF,#845EF7);}
.cat-btn[data-cat="numbers"].active{background:linear-gradient(135deg,#FFD93D,#FF8E53);}
.cat-btn[data-cat="body"].active{background:linear-gradient(135deg,#FF85A2,#B39DDB);}
.cat-btn[data-cat="vehicles"].active{background:linear-gradient(135deg,#FF8E53,#FFD93D);}
.cat-btn[data-cat="greetings"].active{background:linear-gradient(135deg,#B39DDB,#4D96FF);}
.cat-btn[data-cat="family"].active{background:linear-gradient(135deg,#FF85A2,#FF6B6B);}

/* ===== MAIN CARD AREA ===== */
.main-area{
  padding:16px 16px 100px;
  max-width:520px;
  margin:0 auto;
}

/* ===== WORD CARD (big single card) ===== */
.word-display{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:28px 20px 24px;
  text-align:center;
  position:relative;
  margin-bottom:18px;
  transition:transform .2s;
}
.word-display.pop{animation:popCard .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popCard{
  0%{transform:scale(1);}40%{transform:scale(1.04);}100%{transform:scale(1);}
}
.nav-arrows{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}
.nav-btn{
  border:none;background:var(--yellow-light);
  width:44px;height:44px;border-radius:50%;
  font-size:1.4rem;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.nav-btn:hover{background:var(--yellow);transform:scale(1.1);}
.word-counter{
  font-size:.85rem;color:#bbb;font-weight:600;
}
.word-illustration{
  font-size:clamp(6rem,22vw,9rem);
  line-height:1;
  display:block;
  margin:10px auto 18px;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.12));
  cursor:pointer;
  transition:transform .2s;
  user-select:none;
}
.word-illustration img{
  width:clamp(6rem,22vw,9rem);
  height:clamp(6rem,22vw,9rem);
  object-fit:contain;
  display:block;
  margin:0 auto;
}
.word-illustration:hover{transform:scale(1.06);}
.word-illustration.shake{animation:shake .5s ease;}
@keyframes shake{
  0%,100%{transform:rotate(0);}
  20%{transform:rotate(-8deg) scale(1.08);}
  50%{transform:rotate(8deg) scale(1.08);}
  80%{transform:rotate(-4deg) scale(1.04);}
}
.word-english{
  font-size:clamp(2rem,8vw,3rem);
  font-weight:900;color:#333;
  text-transform:capitalize;
  letter-spacing:1px;
}
.word-phonetic{
  font-size:.9rem;color:#bbb;
  font-style:italic;margin:4px 0 6px;
}
.word-chinese{
  font-size:1.3rem;color:#888;font-weight:700;
}
/* learned badge */
.learned-badge{
  position:absolute;top:14px;right:16px;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;font-size:.75rem;font-weight:900;
  padding:4px 10px;border-radius:50px;
  opacity:0;transform:scale(.7);
  transition:all .3s;
}
.learned-badge.show{opacity:1;transform:scale(1);}

/* ===== SPEAK BUTTON ===== */
.speak-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px;
  border:none;border-radius:20px;
  font-size:1.2rem;font-family:inherit;font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;
  box-shadow:0 6px 20px rgba(179,157,219,.4);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  margin-bottom:12px;
  letter-spacing:.5px;
}
.speak-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 28px rgba(179,157,219,.5);}
.speak-btn:active{transform:scale(.97);}
.speak-btn.playing{
  background:linear-gradient(135deg,var(--green),var(--blue));
  animation:pulse .8s ease infinite alternate;
}
@keyframes pulse{
  from{box-shadow:0 6px 20px rgba(77,150,255,.3);}
  to{box-shadow:0 10px 32px rgba(77,150,255,.55);}
}
.speak-icon{font-size:1.6rem;}
.speak-label{flex:1;}
.speak-hint{font-size:.78rem;opacity:.85;font-weight:400;}

/* ===== MINI BUTTONS ROW ===== */
.mini-btns{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:12px;
}
.mini-btn{
  border:none;padding:13px 10px;
  border-radius:16px;font-family:inherit;font-weight:700;font-size:.9rem;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.mini-btn:hover{transform:translateY(-2px);}
.btn-en{background:var(--blue-light);color:var(--blue);}
.btn-en:hover{background:var(--blue);color:#fff;}
.btn-zh{background:var(--pink-light);color:var(--pink);}
.btn-zh:hover{background:var(--pink);color:#fff;}

/* ===== WORD LIST (thumbnails) ===== */
.word-list-title{
  font-size:1rem;color:#bbb;font-weight:700;
  margin:18px 0 10px;text-align:center;letter-spacing:1px;
}
.word-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
  gap:10px;
}
.wl-item{
  background:#fff;border-radius:16px;padding:10px 6px 8px;
  text-align:center;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  transition:all .2s;
  border:2.5px solid transparent;
}
.wl-item:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.13);}
.wl-item.current{border-color:var(--yellow);background:var(--yellow-light);}
.wl-item.done{border-color:var(--green);}
.wl-emoji{font-size:1.8rem;display:block;line-height:1;}
.wl-emoji img{width:1.8rem;height:1.8rem;object-fit:contain;display:block;}
.wl-en{font-size:.68rem;font-weight:700;color:#555;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-check{font-size:.75rem;color:var(--green);}

/* ===== LOG PANEL ===== */
.log-toggle{
  width:100%;border:none;
  background:var(--purple-light);color:var(--purple);
  padding:13px;border-radius:16px;
  font-family:inherit;font-weight:700;font-size:.92rem;
  cursor:pointer;margin-top:18px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.log-toggle:hover{background:var(--purple);color:#fff;}
.log-panel{
  display:none;background:#fff;border-radius:20px;
  padding:16px;margin-top:10px;
  box-shadow:var(--shadow);
  max-height:400px;overflow-y:auto;
}
.log-panel.open{display:block;}
.log-panel h3{font-size:.95rem;color:#888;margin-bottom:12px;}
.log-date-group{margin-bottom:14px;}
.log-date-label{
  font-size:.78rem;font-weight:900;color:var(--purple);
  background:var(--purple-light);display:inline-block;
  padding:2px 10px;border-radius:20px;margin-bottom:6px;
}
.log-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid #F5F5F5;
}
.log-item:last-child{border:none;}
.log-emoji{font-size:1.5rem;}
.log-text{flex:1;}
.log-en{font-size:.95rem;font-weight:700;color:#444;}
.log-zh{font-size:.78rem;color:#aaa;}
.log-time{font-size:.72rem;color:#ccc;}
.log-empty{text-align:center;color:#ccc;padding:20px 0;font-size:.9rem;}

/* ===== QUIZ MODAL ===== */
.quiz-btn{
  width:100%;border:none;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;padding:14px;
  border-radius:16px;
  font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;margin-top:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(255,179,71,.35);
  transition:all .2s;
}
.quiz-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,179,71,.45);}
.quiz-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:2000;
  align-items:center;justify-content:center;
  padding:16px;
}
.quiz-overlay.open{display:flex;}
.quiz-box{
  background:#fff;border-radius:32px;
  padding:28px 24px;width:100%;max-width:460px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.quiz-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:18px;
}
.quiz-title{font-size:1.1rem;font-weight:900;color:#444;}
.quiz-close{
  border:none;background:none;font-size:1.4rem;cursor:pointer;
  color:#bbb;transition:color .2s;
}
.quiz-close:hover{color:#FF6B6B;}
.quiz-score-bar{
  display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;
}
.quiz-dot{
  width:12px;height:12px;border-radius:50%;
  background:#EEE;transition:background .3s;
}
.quiz-dot.correct{background:var(--green);}
.quiz-dot.wrong{background:#FF6B6B;}
.quiz-question{
  text-align:center;margin-bottom:22px;
}
.quiz-q-emoji{font-size:5rem;display:block;margin-bottom:10px;line-height:1;}
.quiz-q-emoji img{width:5rem;height:5rem;object-fit:contain;display:block;margin:0 auto;}
.quiz-q-text{font-size:1rem;color:#888;font-weight:600;}
.quiz-options{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:14px;
}
.quiz-opt{
  border:2.5px solid #EEE;
  background:#FAFAFA;border-radius:16px;
  padding:14px 8px;font-family:inherit;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all .2s;color:#444;text-align:center;
}
.quiz-opt:hover{border-color:var(--yellow);background:var(--yellow-light);}
.quiz-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
.quiz-opt.wrong{border-color:#FF6B6B;background:#FFEBEE;color:#FF6B6B;}
.quiz-opt:disabled{cursor:default;}
.quiz-feedback{
  text-align:center;font-size:1.3rem;font-weight:900;
  min-height:36px;margin-bottom:8px;
}
.quiz-next{
  width:100%;border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;padding:14px;
  border-radius:16px;font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;transition:all .2s;
  display:none;
}
.quiz-next.show{display:block;}
.quiz-next:hover{transform:translateY(-2px);}
.quiz-result{
  text-align:center;
  display:none;
}
.quiz-result.show{display:block;}
.quiz-result-emoji{font-size:4rem;display:block;}
.quiz-result-text{font-size:1.2rem;font-weight:900;color:#444;margin:10px 0 4px;}
.quiz-result-sub{font-size:.9rem;color:#aaa;}
.quiz-restart{
  margin-top:16px;border:none;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  color:#fff;padding:14px 32px;
  border-radius:50px;font-family:inherit;font-weight:900;font-size:1rem;
  cursor:pointer;box-shadow:0 4px 16px rgba(255,179,71,.35);
  transition:transform .2s;
}
.quiz-restart:hover{transform:scale(1.05);}

/* ===== CONFETTI ===== */
.confetti-piece{
  position:fixed;pointer-events:none;z-index:9999;
  width:10px;height:10px;border-radius:3px;
  animation:confettiFall 1.8s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1;}
  100%{transform:translateY(120vh) rotate(720deg) scale(.5);opacity:0;}
}
.fly-star{
  position:fixed;pointer-events:none;z-index:9999;
  font-size:1.6rem;
  animation:flyUp 1.2s ease-out forwards;
}
@keyframes flyUp{
  0%{transform:translateY(0) scale(.5);opacity:1;}
  100%{transform:translateY(-140px) scale(1.2);opacity:0;}
}

/* ===== PLAYING INDICATOR ===== */
.playing-indicator{
  display:none;
  align-items:center;justify-content:center;gap:6px;
  font-size:.85rem;color:var(--blue);font-weight:700;
  margin-top:8px;
}
.playing-indicator.show{display:flex;}
.wave{display:flex;align-items:flex-end;gap:3px;}
.wave-bar{
  width:4px;background:var(--blue);border-radius:4px;
  animation:wave .8s ease-in-out infinite alternate;
}
.wave-bar:nth-child(2){animation-delay:.15s;}
.wave-bar:nth-child(3){animation-delay:.3s;}
.wave-bar:nth-child(4){animation-delay:.15s;}
@keyframes wave{
  from{height:4px;}to{height:18px;}
}

@media(max-width:400px){
  .mini-btns{grid-template-columns:1fr;}
  .word-list{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <span class="deco deco-l">🌟</span>
  <h1>🌈 壮壮英语乐园</h1>
  <p>Baby's English World · 点击按钮听发音！</p>
  <span class="deco deco-r">🎀</span>
</header>

<!-- PROGRESS BANNER -->
<div class="progress-banner">
  <div class="badge" id="totalBadge">0</div>
  <div class="progress-info">
    <div class="label">今日学习进度</div>
    <div class="learned-text" id="learnedText">还没有开始，加油哦！</div>
    <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
    <div class="star-row" id="starRow"></div>
  </div>
</div>

<!-- CATEGORY TABS -->
<div class="cat-scroll" id="catScroll">
  <button class="cat-btn active" data-cat="animals">🐾 动物</button>
  <button class="cat-btn" data-cat="fruits">🍎 水果</button>
  <button class="cat-btn" data-cat="colors">🎨 颜色</button>
  <button class="cat-btn" data-cat="numbers">🔢 数字</button>
  <button class="cat-btn" data-cat="body">👀 身体</button>
  <button class="cat-btn" data-cat="family">👨‍👩‍👧 家庭</button>
  <button class="cat-btn" data-cat="vehicles">🚗 车辆</button>
  <button class="cat-btn" data-cat="greetings">👋 问候</button>
</div>

<!-- MAIN AREA -->
<div class="main-area">

  <!-- BIG WORD CARD -->
  <div class="word-display" id="wordDisplay">
    <div class="learned-badge" id="learnedBadge">✅ 已学会</div>
    <div class="nav-arrows">
      <button class="nav-btn" id="prevBtn">◀</button>
      <div class="word-counter" id="wordCounter">1 / 12</div>
      <button class="nav-btn" id="nextBtn">▶</button>
    </div>

    <!-- illustration -->
    <span class="word-illustration" id="wordIllustration" title="点我">🐱</span>

    <div class="word-english" id="wordEnglish">Cat</div>
    <div class="word-phonetic" id="wordPhonetic">[kæt]</div>
    <div class="word-chinese" id="wordChinese">猫咪</div>

    <!-- playing indicator -->
    <div class="playing-indicator" id="playingIndicator">
      <div class="wave">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <span id="playingLabel">正在播放…</span>
    </div>
  </div>

  <!-- MAIN SPEAK BUTTON -->
  <button class="speak-btn" id="mainSpeakBtn">
    <span class="speak-icon">🔊</span>
    <span class="speak-label">
      点我听发音！<br>
      <span class="speak-hint">先英文 → 再中文</span>
    </span>
  </button>

  <!-- MINI BUTTONS -->
  <div class="mini-btns">
    <button class="mini-btn btn-en" id="btnEn">🇬🇧 只听英文</button>
    <button class="mini-btn btn-zh" id="btnZh">🇨🇳 只听中文</button>
  </div>

  <!-- WORD LIST -->
  <div class="word-list-title">📚 本单元单词</div>
  <div class="word-list" id="wordList"></div>

  <!-- QUIZ BUTTON -->
  <button class="quiz-btn" id="quizBtn">🎯 测试一下，我掌握了多少？</button>

  <!-- LOG TOGGLE -->
  <button class="log-toggle" id="logToggle">📖 每日学习日记 <span id="logCount">(0)</span></button>
  <div class="log-panel" id="logPanel">
    <h3>🌟 学习记录（按日期）</h3>
    <div id="logContent"><div class="log-empty">还没有学过单词哦，快开始吧！</div></div>
  </div>


<!-- QUIZ MODAL -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-box">
    <div class="quiz-header">
      <div class="quiz-title">🎯 单词测试</div>
      <button class="quiz-close" id="quizClose">✕</button>
    </div>
    <div class="quiz-score-bar" id="quizScoreBar"></div>
    <!-- question -->
    <div class="quiz-question" id="quizQuestion">
      <span class="quiz-q-emoji" id="quizEmoji">🐱</span>
      <div class="quiz-q-text" id="quizQText">这是什么？</div>
    </div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next" id="quizNext">下一题 ▶</button>
    <!-- result -->
    <div class="quiz-result" id="quizResult">

//  OPENMOJI IMAGE HELPERS
// ══════════════════════════════════════════
const OPENMOJI_CDN = 'https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/';

function emojiCode(emoji){
  // Convert emoji string to OpenMoji filename code
  // e.g. '🐱' -> '1F431', '1️⃣' -> '0031-FE0F-20E3'
  return [...emoji]
    .map(c => c.codePointAt(0).toString(16).toUpperCase().padStart(4,'0'))
    .join('-');
}

function emojiImg(emoji){
  const code = emojiCode(emoji);
  const url = OPENMOJI_CDN + code + '.svg';
  return `<img src="${url}" data-emoji="${emoji}" alt="${emoji}" loading="lazy">`;
}

// Fallback: if OpenMoji SVG 404s, show original emoji text
document.addEventListener('error', function(e){
  if(e.target.tagName==='IMG' && e.target.dataset.emoji){
    const sp = document.createElement('span');
    sp.textContent = e.target.dataset.emoji;
    e.target.replaceWith(sp);
  }
}, true);

// log structure: [{en, zh, emoji, time, date}]  (date: 'YYYY-MM-DD')
function loadLog(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){return[];} }
function saveLog(lg){ localStorage.setItem(STORAGE_KEY, JSON.stringify(lg)); }
let log = loadLog();

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))+'-'+(String(d.getDate()).padStart(2,'0'));
}

// ══════════════════════════════════════════
//  SPEECH
// ══════════════════════════════════════════
function getEnVoice(){
  const vs = speechSynthesis.getVoices();
  return vs.find(v=>v.lang.startsWith('en')&&/female/i.test(v.name))
      || vs.find(v=>v.lang==='en-US')
      || vs.find(v=>v.lang.startsWith('en'))
      || null;
}
function getZhVoice(){
  const vs = speechSynthesis.getVoices();
  return vs.find(v=>v.lang.startsWith('zh'))||null;
}

function speakText(text, lang, rate=0.85, pitch=1.1){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return;}
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    utter.rate = rate;
    utter.pitch = pitch;
    if(lang.startsWith('en')){const v=getEnVoice();if(v)utter.voice=v;}
    else{const v=getZhVoice();if(v)utter.voice=v;}
    utter.onend = resolve;
    utter.onerror = resolve;
    speechSynthesis.speak(utter);
    // fallback timeout
    const fallback = setTimeout(resolve, text.length*200+1500);
    utter.onend = ()=>{clearTimeout(fallback);resolve();};
  });
}

async function speakBoth(word){
  if(isSpeaking) return;
  isSpeaking=true;
  setPlaying(true,'英语…');
  await speakText(word.e,'en-US',0.82,1.1);
  setPlaying(true,'中文…');
  await new Promise(r=>setTimeout(r,300));
  await speakText(word.z,'zh-CN',0.88,1.0);
  setPlaying(false,'');
  isSpeaking=false;
  markLearned(word);
}

async function speakEn(word){
  if(isSpeaking) return;
  isSpeaking=true;
  setPlaying(true,'英语…');
  await speakText(word.e,'en-US',0.82,1.1);
  setPlaying(false,'');
  isSpeaking=false;
  markLearned(word);
}

async function speakZh(word){
  if(isSpeaking) return;
  isSpeaking=true;
  setPlaying(true,'中文…');
  await speakText(word.z,'zh-CN',0.88,1.0);
  setPlaying(false,'');
  isSpeaking=false;
}

function setPlaying(on, label){
  const ind = document.getElementById('playingIndicator');
  const btn = document.getElementById('mainSpeakBtn');
  const lbl = document.getElementById('playingLabel');
  if(on){
    ind.classList.add('show');
    btn.classList.add('playing');
    lbl.textContent = label;
  } else {
    ind.classList.remove('show');
    btn.classList.remove('playing');
  }
}

// ══════════════════════════════════════════
//  LEARNED / LOG
// ══════════════════════════════════════════
function markLearned(word){
  const already = log.some(l=>l.en===word.e);
  if(!already){
    log.unshift({en:word.e, zh:word.z, emoji:word.i,
      time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
      date:todayStr()
    });
    saveLog(log);
    triggerConfetti();
  }
  updateBadge(word);
  renderProgress();
  renderLog();
  renderWordList();

  // 每点击5次，自动随机跳到下一个单词
  clickCount++;
  if(clickCount >= 5){
    clickCount = 0;
    const words = CATEGORIES[currentCat].words;
    let nextIdx;
    do { nextIdx = Math.floor(Math.random() * words.length); }
    while (words.length > 1 && nextIdx === currentIdx);
    currentIdx = nextIdx;
    setTimeout(()=>{
      renderCard();
      renderWordList();
      const ill = document.getElementById('wordIllustration');
      ill.classList.remove('shake');
      void ill.offsetWidth;
      ill.classList.add('shake');
    }, 800);
  }
}

function isLearned(wordEn){
  return log.some(l=>l.en===wordEn);
}

// ══════════════════════════════════════════
//  RENDER CURRENT WORD
// ══════════════════════════════════════════
function currentWord(){
  return CATEGORIES[currentCat].words[currentIdx];
}

function renderCard(){
  const w = currentWord();
  const words = CATEGORIES[currentCat].words;
  document.getElementById('wordIllustration').innerHTML = emojiImg(w.i);
  document.getElementById('wordEnglish').textContent = w.e;
  document.getElementById('wordPhonetic').textContent = w.p;
  document.getElementById('wordChinese').textContent = w.z;
  document.getElementById('wordCounter').textContent = `${currentIdx+1} / ${words.length}`;
  updateBadge(w);
  // pop animation
  const disp = document.getElementById('wordDisplay');
  disp.classList.remove('pop');
  void disp.offsetWidth;
  disp.classList.add('pop');
}

function updateBadge(w){
  const badge = document.getElementById('learnedBadge');
  if(isLearned(w.e)){badge.classList.add('show');}
  else{badge.classList.remove('show');}
}

// ══════════════════════════════════════════
//  RENDER WORD LIST
// ══════════════════════════════════════════
function renderWordList(){
  const words = CATEGORIES[currentCat].words;
  const container = document.getElementById('wordList');
  container.innerHTML='';
  words.forEach((w,i)=>{
    const div=document.createElement('div');
    div.className='wl-item'+(i===currentIdx?' current':'')+(isLearned(w.e)?' done':'');
    div.innerHTML=`<span class="wl-emoji">${emojiImg(w.i)}</span><div class="wl-en">${w.e}</div>${isLearned(w.e)?'<div class="wl-check">✅</div>':''}`;
    div.addEventListener('click',()=>{
      currentIdx=i;
      renderCard();
      renderWordList();
    });
    container.appendChild(div);
  });
}

// ══════════════════════════════════════════
//  RENDER PROGRESS
// ══════════════════════════════════════════
function renderProgress(){
  const total = Object.values(CATEGORIES).reduce((s,c)=>s+c.words.length,0);
  const n = log.length;
  document.getElementById('totalBadge').textContent = n;
  document.getElementById('learnedText').textContent =
    n===0 ? '还没有开始，加油哦！' : `已学会 ${n} / ${total} 个单词！`;
  const pct = Math.min(100, Math.round(n/total*100));
  document.getElementById('barFill').style.width = pct+'%';
  const stars = '⭐'.repeat(Math.floor(n/3));
  document.getElementById('starRow').textContent = stars;
  document.getElementById('logCount').textContent = `(${n})`;
}

// ══════════════════════════════════════════
//  RENDER LOG (grouped by date)
// ══════════════════════════════════════════
function renderLog(){
  const el = document.getElementById('logContent');
  if(!log.length){
    el.innerHTML='<div class="log-empty">还没有学过单词哦，快开始吧！🌱</div>';
    return;
  }
  // group by date
  const groups = {};
  log.forEach(l=>{
    const d = l.date || '历史记录';
    if(!groups[d]) groups[d]=[];
    groups[d].push(l);
  });
  const sortedDates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  el.innerHTML = sortedDates.map(date=>{
    const today = todayStr();
    const label = date===today ? '📅 今天' : date===getPrevDay(today) ? '📅 昨天' : `📅 ${date}`;
    const items = groups[date].map(l=>`
      <div class="log-item">
        <span class="log-emoji">${l.emoji}</span>
        <div class="log-text">
          <div class="log-en">${l.en}</div>
          <div class="log-zh">${l.zh}</div>
        </div>
        <div class="log-time">${l.time||''}</div>
      </div>
    `).join('');
    return `<div class="log-date-group"><div class="log-date-label">${label}（${groups[date].length} 词）</div>${items}</div>`;
  }).join('');
}

function getPrevDay(dateStr){
  const d = new Date(dateStr);
  d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))+'-'+(String(d.getDate()).padStart(2,'0'));
}

// ══════════════════════════════════════════
//  CONFETTI
// ══════════════════════════════════════════
function triggerConfetti(){
  const colors=['#FF85A2','#FFD93D','#6BCB77','#4D96FF','#B39DDB','#FF6B6B'];
  for(let i=0;i<22;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`
        left:${Math.random()*100}vw;
        top:-20px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'3px'};
        width:${8+Math.random()*8}px;
        height:${8+Math.random()*8}px;
        animation-duration:${1.2+Math.random()*.8}s;
        animation-delay:${Math.random()*.3}s;
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2500);
    },i*60);
  }
  // flying stars from card
  const rect = document.getElementById('wordDisplay').getBoundingClientRect();
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='fly-star';
      el.textContent=['⭐','🌟','✨','💫'][Math.floor(Math.random()*4)];
      el.style.left=(rect.left+rect.width/2-14+(Math.random()-0.5)*80)+'px';
      el.style.top=(rect.bottom-30)+'px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1400);
    },i*150);
  }
}

// ══════════════════════════════════════════
//  SWITCH CATEGORY
// ══════════════════════════════════════════
function switchCategory(cat){
  currentCat = cat;
  currentIdx = 0;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.cat===cat);
  });
  renderCard();
  renderWordList();
}

// ══════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════
document.getElementById('mainSpeakBtn').addEventListener('click',()=>{
  speakBoth(currentWord());
});

document.getElementById('btnEn').addEventListener('click',()=>{
  speakEn(currentWord());
});

document.getElementById('btnZh').addEventListener('click',()=>{
  speakZh(currentWord());
});

document.getElementById('wordIllustration').addEventListener('click',()=>{
  const el = document.getElementById('wordIllustration');
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  speakBoth(currentWord());
});

document.getElementById('prevBtn').addEventListener('click',()=>{
  const words = CATEGORIES[currentCat].words;
  currentIdx = (currentIdx-1+words.length)%words.length;
  renderCard();
  renderWordList();
  speechSynthesis.cancel();
  isSpeaking=false;
  setPlaying(false,'');
});

document.getElementById('nextBtn').addEventListener('click',()=>{
  const words = CATEGORIES[currentCat].words;
  currentIdx = (currentIdx+1)%words.length;
  renderCard();
  renderWordList();
  speechSynthesis.cancel();
  isSpeaking=false;
  setPlaying(false,'');
});

document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click',()=>switchCategory(btn.dataset.cat));
});

document.getElementById('logToggle').addEventListener('click',()=>{
  document.getElementById('logPanel').classList.toggle('open');
});

// ══════════════════════════════════════════
//  QUIZ MODULE
// ══════════════════════════════════════════
const QUIZ_TOTAL = 10;
let quizPool = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;

function getAllWords(){
  return Object.values(CATEGORIES).flatMap(c=>c.words);
}

function buildQuizPool(){
  // prefer learned words, pad with random if < QUIZ_TOTAL
  const all = getAllWords();
  const learned = all.filter(w=>isLearned(w.e));
  let pool = learned.length >= QUIZ_TOTAL
    ? [...learned].sort(()=>Math.random()-.5).slice(0,QUIZ_TOTAL)
    : [...all].sort(()=>Math.random()-.5).slice(0,QUIZ_TOTAL);
  return pool;
}

function buildOptions(correct){
  const all = getAllWords();
  const others = all.filter(w=>w.e!==correct.e).sort(()=>Math.random()-.5).slice(0,3);
  return [...others, correct].sort(()=>Math.random()-.5);
}

function startQuiz(){
  quizPool = buildQuizPool();
  quizIdx = 0;
  quizScore = 0;
  quizAnswered = false;
  document.getElementById('quizOverlay').classList.add('open');
  document.getElementById('quizResult').classList.remove('show');
  renderQuizQuestion();
  renderQuizScoreBar();
}

function renderQuizScoreBar(){
  const bar = document.getElementById('quizScoreBar');
  bar.innerHTML = Array.from({length:QUIZ_TOTAL},(_,i)=>{
    let cls='quiz-dot';
    if(i<quizIdx) cls+=' correct'; // simplified; updated in real-time
    return `<div class="${cls}" id="qdot${i}"></div>`;
  }).join('');
}

function updateScoreDot(idx, correct){
  const dot = document.getElementById('qdot'+idx);
  if(dot) dot.className = 'quiz-dot ' + (correct?'correct':'wrong');
}

function renderQuizQuestion(){
  if(quizIdx >= quizPool.length){ showQuizResult(); return; }
  quizAnswered = false;
  const w = quizPool[quizIdx];
  document.getElementById('quizEmoji').innerHTML = emojiImg(w.i);
  document.getElementById('quizQText').textContent = '这个英文单词是？（看图选答案）';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizNext').classList.remove('show');

  // speak the word
  speakText(w.e,'en-US',0.82,1.1);

  const opts = buildOptions(w);
  const container = document.getElementById('quizOptions');
  container.innerHTML='';
  opts.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='quiz-opt';
    btn.textContent = opt.e + '\n' + opt.z;
    btn.style.whiteSpace='pre-line';
    btn.addEventListener('click',()=>handleQuizAnswer(opt.e===w.e, btn, opts, w));
    container.appendChild(btn);
  });
}

function handleQuizAnswer(isCorrect, clickedBtn, opts, correctWord){
  if(quizAnswered) return;
  quizAnswered = true;

  // mark buttons
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent.startsWith(correctWord.e)) b.classList.add('correct');
  });
  if(!isCorrect) clickedBtn.classList.add('wrong');

  if(isCorrect){
    quizScore++;
    document.getElementById('quizFeedback').textContent='🎉 太棒了！答对啦！';
    document.getElementById('quizFeedback').style.color='var(--green)';
    speakText('Very good','en-US',0.9,1.2);
  } else {
    document.getElementById('quizFeedback').textContent='❌ 再想想！是 '+correctWord.e+'（'+correctWord.z+'）';
    document.getElementById('quizFeedback').style.color='#FF6B6B';
    speakText(correctWord.e,'en-US',0.82,1.1);
  }
  updateScoreDot(quizIdx, isCorrect);
  quizIdx++;
  document.getElementById('quizNext').classList.add('show');
  if(quizIdx>=quizPool.length){
    document.getElementById('quizNext').textContent='查看结果 🎊';
  } else {
    document.getElementById('quizNext').textContent='下一题 ▶';
  }
}

function showQuizResult(){
  document.getElementById('quizQuestion').style.display='none';
  document.getElementById('quizOptions').style.display='none';
  document.getElementById('quizFeedback').style.display='none';
  document.getElementById('quizNext').classList.remove('show');
  const res = document.getElementById('quizResult');
  res.classList.add('show');
  const pct = Math.round(quizScore/QUIZ_TOTAL*100);
  let emoji='🌟', text='';
  if(pct>=90){emoji='🏆';text='完美！壮壮太厉害了！';}
  else if(pct>=70){emoji='🎉';text='很棒！继续加油！';}
  else if(pct>=50){emoji='😊';text='不错哦，再练练！';}
  else{emoji='💪';text='多多练习，你一定可以！';}
  document.getElementById('quizResultEmoji').textContent=emoji;
  document.getElementById('quizResultText').textContent=text;
  document.getElementById('quizResultSub').textContent=`答对 ${quizScore} / ${QUIZ_TOTAL} 题（${pct}%）`;
}

function resetQuizDisplay(){
  document.getElementById('quizQuestion').style.display='';
  document.getElementById('quizOptions').style.display='';
  document.getElementById('quizFeedback').style.display='';
  document.getElementById('quizResult').classList.remove('show');
}

document.getElementById('quizBtn').addEventListener('click', startQuiz);
document.getElementById('quizClose').addEventListener('click',()=>{
  document.getElementById('quizOverlay').classList.remove('open');
  speechSynthesis.cancel();
  resetQuizDisplay();
});
document.getElementById('quizNext').addEventListener('click',()=>{
  resetQuizDisplay();
  renderQuizQuestion();
});
document.getElementById('quizRestart').addEventListener('click',()=>{
  resetQuizDisplay();
  startQuiz();
});
document.getElementById('quizOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('quizOverlay')){
    document.getElementById('quizOverlay').classList.remove('open');
    speechSynthesis.cancel();
    resetQuizDisplay();
  }
});

// keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') document.getElementById('nextBtn').click();
  if(e.key==='ArrowLeft') document.getElementById('prevBtn').click();
  if(e.key===' '||e.key==='Enter') document.getElementById('mainSpeakBtn').click();
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
speechSynthesis.onvoiceschanged = ()=>{}; // preload
speechSynthesis.getVoices();

renderCard();
renderWordList();
renderProgress();
renderLog();
</script>
